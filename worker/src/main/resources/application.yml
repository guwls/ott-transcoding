spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ott
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway(앱)에서 관리
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    bootstrap-servers: localhost:9094   # 호스트에서 접근하는 외부포트
    consumer:
      group-id: transcode-workers
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.example.worker.messaging.TranscodeRequestedEvent
        spring.json.trusted.packages: com.example.*
        spring.json.add.type.headers: true
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 1
    listener:
      ack-mode: MANUAL                   # 수동 커밋

storage:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin123
  bucket: media

app:
  topics:
    transcode-requests: transcode-requests-v1
  worker:
    simulate-ms: 500                     # 더미 처리 시간
    fail-on-any-variant: false
    simulate-all: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  metrics:
    tags:
      application: ott-worker
